name: Release Validation

on:
  push:
    tags: 'v*'
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate module.json
        run: |
          if ! jq empty module.json 2>/dev/null; then
            echo "::error::module.json is not valid JSON"
            exit 1
          fi
          echo "::notice::module.json JSON is valid"

      - name: Verify tag matches version
        run: |
          version=$(jq -r '.version' module.json)
          tag="${GITHUB_REF#refs/tags/}"
          if [[ "$tag" == v* ]]; then
            expected="${tag#v}"
            if [ "$version" != "$expected" ]; then
              echo "::error::Tag version (v$expected) does not match module.json version ($version)"
              exit 1
            fi
            echo "::notice::Tag v$expected matches module.json version $version"
          fi
